<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipForge — Video Editor</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;600;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* === RESET & BASE === */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg-0: #06060a;
  --bg-1: #0c0c14;
  --bg-2: #12121e;
  --bg-3: #1a1a2e;
  --bg-4: #22223a;
  --surface: #16162488;
  --border: #ffffff0a;
  --text-1: #eef0ff;
  --text-2: #a0a4c0;
  --text-3: #5c5f7e;
  --accent: #00E5FF;
  --accent-2: #7C4DFF;
  --radius: 12px;
  --font: 'DM Sans', sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg-0);
  color: var(--text-1);
}

/* ===== (CSS COMPLETO CONTINUA — SEM ALTERAÇÃO) ===== */
</style>
</head>

<body>

<!-- ================= AUTH ================= -->
<div id="screen-auth" class="screen active">
  <div class="auth-container">
    <div class="auth-card">

      <h2>ClipForge</h2>

      <form id="form-login" onsubmit="return false">
        <input type="email" placeholder="Seu email">
        <input type="password" placeholder="Senha">
        <button onclick="doLogin()">Entrar</button>
      </form>

    </div>
  </div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="screen-dashboard" class="screen">
  <h1>Dashboard</h1>
  <button onclick="navigateTo('editor')">Novo Projeto</button>
</div>

<!-- ================= EDITOR ================= -->
<div id="screen-editor" class="screen">
  <h1>Editor</h1>
  <button onclick="navigateTo('dashboard')">Voltar</button>
</div>

<script>
// ===== APP =====
(function() {

  function initParticles() {
    const canvas = document.getElementById('auth-particles');
    if (!canvas) return;
  }

  window.navigateTo = function(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + screen).classList.add('active');
  };

  window.doLogin = function() {
    setTimeout(() => {
      navigateTo('dashboard');
    }, 800);
  };

  function populateTemplates() {
    const carousel = document.getElementById('templates-carousel');
    if (!carousel) return;

    const templates = [
      { name: 'Vlog Dinâmico' },
      { name: 'Reels Fitness' },
      { name: 'Receita Rápida' }
    ];

    carousel.innerHTML = templates.map(t => `<div>${t.name}</div>`).join('');
  }

  function populateProjects() {
    const grid = document.getElementById('projects-grid');
    if (!grid) return;

    const projects = [
      { name: 'Meu vlog' },
      { name: 'Review' }
    ];

    grid.innerHTML = projects.map(p => `<div>${p.name}</div>`).join('');
  }

  function buildRuler() {
    const ruler = document.getElementById('timeline-ruler');
    if (!ruler) return;
  }

  function buildWaveform() {
    const wf = document.getElementById('waveform-1');
    if (!wf) return;
  }

  function buildMediaThumbs() {
    const container = document.getElementById('media-thumbs');
    if (!container) return;
  }

  // INIT
  initParticles();
  populateTemplates();
  populateProjects();
  buildRuler();
  buildWaveform();
  buildMediaThumbs();

})();
</script>

</body>
</html>
