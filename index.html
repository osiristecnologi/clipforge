<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ClipForge</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #0d1323;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: #4fd1ff;
    }

    .btn {
      background: linear-gradient(90deg, #00d4ff, #7b61ff);
      border: none;
      padding: 10px 15px;
      border-radius: 10px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
      background: linear-gradient(135deg, #1a1f3a, #0d1323);
    }

    .card h1 {
      margin: 0;
    }

    .highlight {
      color: #4fd1ff;
    }

    .formats {
      display: flex;
      gap: 10px;
      padding: 20px;
    }

    .format {
      flex: 1;
      background: #111;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">ClipForge</div>
    <button class="btn">Novo Projeto</button>
  </header>

  <div class="card">
    <h1>Crie vídeos <span class="highlight">incríveis</span></h1>
    <p>Editor profissional com IA.</p>
    <button class="btn" onclick="criarProjeto()">Começar Novo Projeto</button>
  </div>

  <div class="formats">
    <div class="format">Reels 9:16</div>
    <div class="format">TikTok 9:16</div>
  </div>

  <script>
    function criarProjeto() {
      alert("Novo projeto criado 🚀");
    }
  </script>

</body>
</html>
